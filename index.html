<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>ASSAULT LOG</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060912;--bg2:#0c1224;--bg3:#131b32;--bg4:#1c2545;
  --ac:#4a9eff;--ac2:#7bc4ff;--ac3:#2563d8;--acd:rgba(74,158,255,0.12);
  --gold:#f5c842;--silver:#c0c8d8;--bronze:#d4845a;--plat:#c4a5ff;
  --tx:#e8eeff;--tx2:#8899bb;--tx3:#4a5a7a;
  --bd:rgba(74,158,255,0.18);--bd2:rgba(74,158,255,0.08);
  --lun:#c084fc;--tor:#f87171;--ins:#4ade80;--ext:#fb923c;--hrd:#94a3b8;
  --exp:#ff6b6b;--pen:#ffd93d;--mys:#4fc3f7;--vib:#ce93d8;
  --r:14px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);background-image:radial-gradient(at 20% 0%,rgba(74,158,255,0.07),transparent 50%),radial-gradient(at 80% 100%,rgba(192,132,252,0.04),transparent 50%);background-attachment:fixed;color:var(--tx);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield;appearance:textfield}

/* HEADER */
.hdr{background:rgba(6,9,18,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:56px}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,#1a3a6e,#0d1f42);border:1px solid var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(74,158,255,0.3);font-size:13px;font-weight:700;color:var(--ac2);font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.hdr-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--tx);letter-spacing:3px}
.hdr-sub{font-size:10px;color:var(--tx3);letter-spacing:0.5px;margin-top:1px}
.hdr-acts{display:flex;gap:6px}
.ibtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--bd2);background:var(--bg2);color:var(--tx2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.ibtn:active{background:var(--acd);border-color:var(--ac);color:var(--ac)}

/* NAV */
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd2);overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:99;backdrop-filter:blur(20px)}
.nav::-webkit-scrollbar{display:none}
.ntab{flex:1;min-width:70px;padding:11px 8px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tx3);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap;position:relative;letter-spacing:0.3px}
.ntab.on{color:var(--ac);border-bottom-color:var(--ac);text-shadow:0 0 12px rgba(74,158,255,0.6)}
.ntab:hover:not(.on){color:var(--tx2)}

/* MAIN */
.main{padding:14px;max-width:1200px;margin:0 auto;padding-bottom:80px}
.pg{display:none;animation:fi 0.25s ease}
.pg.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:8px;margin:20px 0 10px}
.sh:first-child{margin-top:0}
.sh::before{content:'';width:3px;height:13px;background:var(--ac);border-radius:2px}
.sh h2{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--tx);letter-spacing:1.5px;text-transform:uppercase}

/* STAT CARDS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(min-width:600px){.sgrid{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:14px 16px}
.sc.hero{background:linear-gradient(135deg,rgba(74,158,255,0.12),rgba(37,99,216,0.06));border-color:rgba(74,158,255,0.3)}
.slbl{font-size:11px;color:var(--tx2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:5px}
.sval{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:var(--tx);line-height:1}
.sval.ac{color:var(--ac2)}
.ssub{font-size:10px;color:var(--tx3);margin-top:3px}

/* CHART */
.cc{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:14px;margin-bottom:14px}
.cc canvas{max-height:200px}

/* TROPHY */
.trow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.tc{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 6px;text-align:center}
.tic{width:38px;height:38px;margin:0 auto 6px;display:block}
.tcnt{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;line-height:1}
.tnm{font-size:10px;color:var(--tx2);margin-top:2px}

/* IN */
.inrow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.inc{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rs);padding:10px;text-align:center}
.innum{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--ac)}
.inlbl{font-size:10px;color:var(--tx3);margin-top:2px}

/* COLLAPSIBLE */
details.sec{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
details.sec summary{padding:12px 14px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--tx);cursor:pointer;letter-spacing:1px;text-transform:uppercase;list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
details.sec summary::-webkit-details-marker{display:none}
details.sec summary::before{content:'';width:3px;height:13px;background:var(--ac);border-radius:2px}
details.sec summary::after{content:'▾';margin-left:auto;color:var(--tx2);transition:transform 0.2s;font-size:12px}
details.sec[open] summary::after{transform:rotate(180deg)}
.secb{padding:0 14px 14px}

/* BOSS RANK TABLE */
.brt{width:100%;border-collapse:collapse}
.brt th,.brt td{padding:7px 6px;font-size:12px;border-bottom:1px solid var(--bd2)}
.brt th{color:var(--tx3);font-weight:500;font-size:10px;letter-spacing:0.5px;text-transform:uppercase}
.brt td.num{font-family:'Rajdhani',sans-serif;font-weight:700;text-align:right;font-size:14px;min-width:60px}
.brt tr:last-child td{border-bottom:none}
.bri{display:flex;align-items:center;gap:7px}
.bri-img{width:22px;height:22px;border-radius:5px;background:var(--bg3);overflow:hidden;flex-shrink:0}
.bri-img img{width:100%;height:100%;object-fit:cover;object-position:center 30%}

/* TABLE */
.tcard{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden}
.tr{display:grid;grid-template-columns:36px 1fr auto 22px;gap:8px;padding:8px 10px;border-bottom:1px solid var(--bd2);align-items:center;cursor:pointer;transition:background 0.1s}
.tr:active{background:var(--bg3)}
.tr:last-child{border-bottom:none}
.tsn{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--tx2)}
.tboss{display:flex;align-items:center;gap:7px;min-width:0}
.tbimg{width:30px;height:30px;border-radius:7px;background:var(--bg3);overflow:hidden;flex-shrink:0;border:1px solid var(--bd2)}
.tbimg img{width:100%;height:100%;object-fit:cover;object-position:center 25%}
.tbname{font-size:12px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmeta{display:flex;gap:3px;align-items:center;margin-top:2px;flex-wrap:wrap}
.trank{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--ac);white-space:nowrap;text-align:right}
.trank.mt{color:var(--tx3);font-size:12px}
.ttier{width:22px;height:22px}
.tic2{width:13px;height:13px}

/* DIFF BADGES */
.db{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:0.3px}
.dLUN{background:rgba(192,132,252,0.18);color:var(--lun)}
.dTOR{background:rgba(248,113,113,0.18);color:var(--tor)}
.dINS{background:rgba(74,222,128,0.15);color:var(--ins)}
.dEXT{background:rgba(251,146,60,0.15);color:var(--ext)}
.dHRD{background:rgba(148,163,184,0.12);color:var(--hrd)}
/* 속성 배지 - 인게임 색상 */
.aEXP{background:rgba(255,80,80,0.15);color:#ff5050;border:1px solid rgba(255,80,80,0.35)}
.aPEN{background:rgba(255,210,0,0.15);color:#ffd200;border:1px solid rgba(255,210,0,0.35)}
.aMYS{background:rgba(60,180,255,0.15);color:#3cb4ff;border:1px solid rgba(60,180,255,0.35)}
.aVIB{background:rgba(190,120,230,0.15);color:#be78e6;border:1px solid rgba(190,120,230,0.35)}
.aTOR-EXP{background:rgba(255,50,50,0.25);color:#ff3232;border:2px solid rgba(255,50,50,0.6);font-weight:700}
.aTOR-PEN{background:rgba(255,200,0,0.25);color:#ffc800;border:2px solid rgba(255,200,0,0.6);font-weight:700}
.aTOR-MYS{background:rgba(40,160,255,0.25);color:#28a0ff;border:2px solid rgba(40,160,255,0.6);font-weight:700}
.aTOR-VIB{background:rgba(180,100,220,0.25);color:#b464dc;border:2px solid rgba(180,100,220,0.6);font-weight:700}

/* FILTER */
.fbar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:10px;align-items:center}
.fbar::-webkit-scrollbar{display:none}
.fc{padding:5px 12px;border-radius:999px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all 0.15s}
.fc.on{background:var(--ac);border-color:var(--ac);color:white;font-weight:500}
.sbox{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;margin-bottom:10px}
.sbox:focus{outline:none;border-color:var(--ac)}

/* SORT ROW */
.sortrow{display:flex;gap:8px;margin-bottom:10px}
.sortrow .sbox{margin-bottom:0;flex:1}
.sbtn{width:36px;flex-shrink:0;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx2);cursor:pointer;font-size:16px;transition:all 0.15s}
.sbtn:active,.sbtn.asc{background:var(--acd);border-color:var(--ac);color:var(--ac)}

/* BOSS GRID */
.bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.bgrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
.bcard{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all 0.2s}
.bcard:active{transform:scale(0.97)}
.bcard.sel{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac)}
.bcimg{width:100%;height:100px;background:var(--bg3);overflow:hidden}
.bcimg img{width:100%;height:100%;object-fit:cover;object-position:center 25%}
.bcinfo{padding:8px 10px}
.bcname{font-size:12px;font-weight:500}
.bcbest{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--ac)}
.bcmeta{font-size:10px;color:var(--tx2);margin-top:1px}

/* BOSS DETAIL */
.bdet{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden;margin-top:12px}
.bdh{height:130px;position:relative;overflow:hidden;background:var(--bg3)}
.bdh img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.bdh::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(12,18,36,0.95))}
.bdhn{position:absolute;bottom:10px;left:12px;z-index:1;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.6)}
.bdst{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd2);border-bottom:1px solid var(--bd2)}
.bds{background:var(--bg2);padding:10px;text-align:center}
.bdsv{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--ac)}
.bdsl{font-size:10px;color:var(--tx2);margin-top:2px}

/* OVERVIEW */
.ovs{margin-bottom:20px}
.ovt{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--tx2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ovt::before{content:'';width:3px;height:11px;background:var(--ac);border-radius:2px}
.ovleg{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ovli{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2)}
.ovld{width:10px;height:10px;border-radius:2px}
.ovgrid{display:flex;flex-wrap:wrap;gap:2px}
.ovc{width:56px;height:40px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s;background:var(--bg3);border:1px solid var(--bd2);flex-shrink:0}
.ovc:active{transform:scale(0.92)}
.ovc.plat{background:rgba(196,165,255,0.28);border-color:rgba(196,165,255,0.5)}
.ovc.gold{background:rgba(245,200,66,0.22);border-color:rgba(245,200,66,0.4)}
.ovc.silver{background:rgba(192,200,216,0.18);border-color:rgba(192,200,216,0.35)}
.ovc.bronze{background:rgba(212,132,90,0.18);border-color:rgba(212,132,90,0.35)}
.ovsn{font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;color:rgba(255,255,255,0.4);line-height:1}
.ovbn{font-size:8px;color:rgba(255,255,255,0.6);line-height:1;margin-top:1px;white-space:nowrap;overflow:hidden;max-width:52px;text-overflow:ellipsis;text-align:center}
.ovrk{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;line-height:1;margin-top:2px}
.ovc.plat .ovrk{color:#e2d4ff}
.ovc.gold .ovrk{color:#fde68a}
.ovc.silver .ovrk{color:#e2e8f0}
.ovc.bronze .ovrk{color:#fed7aa}
.ovc.empty-r .ovrk{color:var(--tx3);font-size:9px}

/* RANK INPUT */
details.pb{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
details.pb summary{padding:10px 14px;font-size:12px;color:var(--tx);cursor:pointer;font-weight:500;user-select:none;list-style:none;display:flex;align-items:center;gap:6px}
details.pb summary::-webkit-details-marker{display:none}
details.pb summary::after{content:'▾';margin-left:auto;color:var(--tx2);font-size:11px;transition:transform 0.2s}
details.pb[open] summary::after{transform:rotate(180deg)}
.pbc{padding:0 14px 14px}
.pbh{font-size:11px;color:var(--tx2);margin-bottom:8px;line-height:1.6}
.pba{width:100%;min-height:90px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);padding:10px 12px;font-size:13px;font-family:'Rajdhani',sans-serif;resize:vertical}
.pba:focus{outline:none;border-color:var(--ac)}
.bkinfo{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rs);padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--tx2)}
.bklist{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden}
.bkrow{display:grid;grid-template-columns:28px 36px 1fr 100px 24px;gap:8px;padding:7px 10px;border-bottom:1px solid var(--bd2);align-items:center}
.bkrow:last-child{border-bottom:none}
.bkimg{width:28px;height:28px;border-radius:6px;background:var(--bg3);overflow:hidden}
.bkimg img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
.bksn{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--tx2);text-align:center}
.bkic{min-width:0}
.bkname{font-size:11px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bkmeta{display:flex;gap:3px;align-items:center;margin-top:2px;flex-wrap:wrap}
.bkinput{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:5px 8px;font-size:16px;font-family:'Rajdhani',sans-serif;font-weight:600;text-align:right}
.bkinput:focus{outline:none;border-color:var(--ac)}
.bkinput.chg{border-color:var(--gold);background:rgba(245,200,66,0.08)}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:1000;align-items:flex-end;justify-content:center}
.mbg.on{display:flex;animation:fi 0.2s}
.modal{background:var(--bg2);border:1px solid var(--bd);border-top-left-radius:24px;border-top-right-radius:24px;padding:20px 20px 32px;width:100%;max-width:480px;animation:su 0.25s ease-out}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:600px){
  .mbg{align-items:center}
  .modal{border-radius:20px;max-width:400px}
  @keyframes su{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
}
.mhdl{width:32px;height:4px;background:var(--tx3);border-radius:2px;margin:-6px auto 14px;opacity:0.4}
.modal h3{font-size:15px;margin-bottom:3px;color:var(--tx);font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.msub{font-size:11px;color:var(--tx2);margin-bottom:16px}
.fg{margin-bottom:12px}
.fl{font-size:10px;color:var(--tx2);margin-bottom:5px;display:block;letter-spacing:0.5px;text-transform:uppercase}
.fi,.fs{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);padding:10px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif}
.fi:focus,.fs:focus{outline:none;border-color:var(--ac)}
.ma{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:11px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg3);color:var(--tx);cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all 0.15s}
.btn:active{transform:scale(0.97)}
.btnp{background:var(--ac);color:white;border-color:var(--ac)}
.btnsm{flex:0 0 auto;padding:8px 14px;font-size:12px}

/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac3));border:none;color:white;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(74,158,255,0.4);z-index:50;transition:transform 0.2s;display:none}
.fab:active{transform:scale(0.91)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--ac);color:var(--tx);padding:8px 18px;border-radius:999px;font-size:12px;z-index:2000;pointer-events:none;opacity:0;transition:opacity 0.2s;white-space:nowrap}
.toast.on{opacity:1}


.rank-gold{background:rgba(245,200,66,0.13)!important;border-left:3px solid #f5c842!important;}
.rank-gold .trank,.rank-gold .bkinput{color:#f5c842!important;}
.rank-silver{background:rgba(220,230,255,0.13)!important;border-left:3px solid #c8d8ff!important;}
.rank-silver .trank,.rank-silver .bkinput{color:#c8d8ff!important;}
.rank-bronze{background:rgba(212,132,90,0.13)!important;border-left:3px solid #d4845a!important;}
.rank-bronze .trank,.rank-bronze .bkinput{color:#d4845a!important;}


.in-tooltip{position:fixed;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 12px;font-size:11px;color:var(--tx);z-index:500;pointer-events:none;display:none;max-width:240px;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.empty{text-align:center;padding:32px;color:var(--tx3);font-size:12px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-icon">BA</div>
    <div>
      <div class="hdr-title">ASSAULT LOG</div>
      <div class="hdr-sub">총력전 &amp; 대결전</div>
    </div>
  </div>
  <div class="hdr-acts" style="position:relative">
    <button class="ibtn" onclick="toggleMenu()" id="menu-btn" title="설정">⚙</button>
    <div id="settings-menu" style="display:none;position:absolute;top:40px;right:0;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;min-width:200px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.4)">
      <div style="padding:8px 14px 4px;font-size:10px;color:var(--tx3);border-bottom:1px solid var(--bd2)">데이터 관리</div>
      <button onclick="exportData();toggleMenu()" style="width:100%;padding:8px 14px;background:transparent;border:none;border-bottom:1px solid var(--bd2);color:var(--tx);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:left">
        <div>⬆ 백업 저장</div>
        <div style="font-size:10px;color:var(--tx3);margin-top:2px">입력한 순위를 파일로 백업</div>
      </button>
      <button onclick="document.getElementById('impf').click();toggleMenu()" style="width:100%;padding:8px 14px;background:transparent;border:none;border-bottom:1px solid var(--bd2);color:var(--tx);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:left">
        <div>⬇ 백업 불러오기</div>
        <div style="font-size:10px;color:var(--tx3);margin-top:2px">백업 파일로 기록 복원</div>
      </button>
      <button onclick="exportExcel();toggleMenu()" style="width:100%;padding:8px 14px;background:transparent;border:none;border-bottom:1px solid var(--bd2);color:var(--tx);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:left">
        <div>📊 엑셀로 내보내기</div>
        <div style="font-size:10px;color:var(--tx3);margin-top:2px">전체 시즌 기록을 엑셀 파일로 저장</div>
      </button>
      <button onclick="confirmReset();toggleMenu()" style="width:100%;padding:8px 14px;background:transparent;border:none;color:#f87171;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:left;opacity:0.7">⚠ 기록 전체 초기화</button>
      <div style="padding:10px 14px;border-top:1px solid var(--bd2)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-size:11px;color:var(--tx2)">↔ 너비 조절 <span id="width-val" style="color:var(--ac);font-weight:700"></span></div>
          <button onclick="setWidth(1200)" style="background:transparent;border:1px solid var(--bd2);border-radius:4px;color:var(--tx3);font-size:10px;padding:2px 6px;cursor:pointer">↺ 초기화</button>
        </div>
        <input type="range" id="width-slider" min="400" max="1400" step="10" style="width:100%;accent-color:var(--ac)" oninput="setWidth(this.value)">
      </div>
    </div>
    <input type="file" id="impf" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="nav">
  <button class="ntab on" onclick="showPg('dashboard',this)">대시보드</button>
  <button class="ntab" onclick="showPg('raid',this)">총력전</button>
  <button class="ntab" onclick="showPg('elim',this)">대결전</button>
  <button class="ntab" onclick="showPg('bosses',this)">보스별</button>
  <button class="ntab" onclick="showPg('overview',this)">전체 현황</button>
  <button class="ntab" onclick="showPg('bulk',this)">순위 입력</button>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div class="pg on" id="pg-dashboard">
    <div class="sgrid" id="dash-stats"></div>
    <div class="sh"><h2>트로피</h2></div>
    <div class="trow" id="t-row"></div>
    <div class="sh"><h2>순위 기록</h2></div>
    <div style="margin-bottom:14px" id="in-wrap">
      <div style="background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:12px;margin-bottom:8px">
        <div style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span style="width:3px;height:10px;background:var(--ac);border-radius:2px;display:inline-block"></span>총력전</div>
        <div class="inrow" id="in-raid"></div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:12px">
        <div style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:#fb923c;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span style="width:3px;height:10px;background:#fb923c;border-radius:2px;display:inline-block"></span>대결전</div>
        <div class="inrow" id="in-elim"></div>
      </div>
    </div>
    <details class="sec" id="top-ranks-detail">
      <summary>상세 순위 기록 (TOP 50)</summary>
      <div class="secb" id="top-ranks-body"></div>
    </details>
    <details class="sec">
      <summary>보스별 순위표 — 총력전</summary>
      <div class="secb"><table class="brt" id="brt-r"></table></div>
    </details>
    <details class="sec">
      <summary>보스별 순위표 — 대결전</summary>
      <div class="secb"><table class="brt" id="brt-e"></table></div>
    </details>
    <div class="sh" style="align-items:center"><h2>순위 추이</h2>
      <div style="display:flex;gap:4px;margin-left:auto">
        <button class="fc on" id="cp-all" onclick="setChartPreset('all',this)" style="padding:3px 10px;font-size:10px">전체</button>
        <button class="fc" id="cp-10k" onclick="setChartPreset('10000',this)" style="padding:3px 10px;font-size:10px">1만↑</button>
        <button class="fc" id="cp-1k" onclick="setChartPreset('1000',this)" style="padding:3px 10px;font-size:10px">1천↑</button>
        <button class="fc" id="cp-100" onclick="setChartPreset('100',this)" style="padding:3px 10px;font-size:10px">100↑</button>
      </div>
    </div>
    <div class="cc"><div style="font-size:10px;color:#4a9eff;font-weight:700;margin-bottom:6px">총력전</div><div id="ch-raid-trend" style="width:100%;height:320px"></div></div>
    <div class="cc"><div style="font-size:10px;color:#fb923c;font-weight:700;margin-bottom:6px">대결전</div><div id="ch-elim-trend" style="width:100%;height:280px"></div></div>
  </div>

  <!-- RAID -->
  <div class="pg" id="pg-raid">

    <div class="sortrow">
      <input class="sbox" id="rsrch" placeholder="🔍 보스 이름/초성 검색..." oninput="renderRaid()">
      <button class="sbtn" id="rsort" onclick="toggleSort('raid')">↓</button>
    </div>
    <div class="tcard" id="rlist"></div>
  </div>

  <!-- ELIM -->
  <div class="pg" id="pg-elim">
    <div class="sortrow">
      <input class="sbox" id="esrch" placeholder="🔍 보스 이름/초성 검색..." oninput="renderElim()">
      <button class="sbtn" id="esort" onclick="toggleSort('elim')">↓</button>
    </div>
    <div class="tcard" id="elist"></div>
  </div>

  <!-- BOSSES -->
  <div class="pg" id="pg-bosses">
    <div class="fbar">
      <button class="fc on" onclick="setBM('raid',this)">총력전</button>
      <button class="fc" onclick="setBM('elim',this)">대결전</button>
    </div>
    <div class="bgrid" id="bgrid"></div>
    <div id="bdet"></div>
  </div>

  <!-- OVERVIEW -->
  <div class="pg" id="pg-overview">
    <div class="ovleg">
      <div class="ovli"><div class="ovld" style="background:rgba(196,165,255,0.5)"></div>플래티넘</div>
      <div class="ovli"><div class="ovld" style="background:rgba(245,200,66,0.4)"></div>골드</div>
      <div class="ovli"><div class="ovld" style="background:rgba(192,200,216,0.3)"></div>실버</div>
      <div class="ovli"><div class="ovld" style="background:rgba(212,132,90,0.3)"></div>브론즈</div>
      <div class="ovli"><div class="ovld" style="background:var(--bg3)"></div>미입력</div>
    </div>
    <div class="ovs"><div class="ovt">총력전</div><div class="ovgrid" id="ov-r"></div></div>
    <div class="ovs"><div class="ovt">대결전</div><div class="ovgrid" id="ov-e"></div></div>
  </div>

  <!-- BULK -->
  <div class="pg" id="pg-bulk">
    <div class="fbar">
      <button class="fc on" onclick="setBK('raid',this)">총력전</button>
      <button class="fc" onclick="setBK('elim',this)">대결전</button>
    </div>
    <details class="pb">
      <summary>📋 외부 시트에서 붙여넣기</summary>
      <div class="pbc">
        <p class="pbh">엑셀/구글시트에서 순위 열을 선택 후 여기에 붙여넣기 하세요.<br>빈 칸은 자동으로 건너뛰며, 아래 <b>시작 시즌</b>을 지정하면 해당 시즌부터 매핑됩니다.</p>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <label style="font-size:11px;color:var(--tx2);white-space:nowrap">시작 시즌</label>
          <input class="fi" id="paste-start" type="number" inputmode="numeric" min="1" placeholder="예: 44 (비우면 첫 시즌부터)" style="padding:6px 10px;font-size:12px;flex:1">
        </div>
        <textarea class="pba" id="parea" placeholder="여기에 붙여넣기 (Ctrl+V)..."></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btnsm" onclick="document.getElementById('parea').value='';document.getElementById('paste-start').value=''">지우기</button>
          <button class="btn btnp btnsm" onclick="applyPaste()">적용</button>
        </div>
      </div>
    </details>
    <div class="fbar" id="bkf">
      <button class="fc on" onclick="setBKF('all',this)">전체</button>
      <button class="fc" onclick="setBKF('empty',this)">미입력만</button>
      <button class="fc" onclick="setBKF('filled',this)">입력된 것만</button>
    </div>
    <div class="bkinfo">
      <span id="bkstat">변경사항 없음</span>
      <div style="display:flex;gap:6px">
        <button class="btn btnsm" id="revert-btn" onclick="revertBulk()" style="display:none;background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3);color:#f87171">↩ 되돌리기</button>
        <button class="btn btnp btnsm" onclick="saveBulk()">💾 저장</button>
      </div>
    </div>
    <div class="bklist" id="bklist"></div>
  </div>

</div>

<button class="fab" id="fab" onclick="openAM()">＋</button>


<!-- EDIT SEASON MODAL -->
<div class="mbg" id="em">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhdl"></div>
    <h3 id="em-t">시즌 수정</h3>
    <div class="fg"><label class="fl">보스</label><select class="fs" id="em-b"></select></div>
    <div class="fg"><label class="fl">지형</label>
      <select class="fs" id="em-tr">
        <option value="시가전">시가전</option>
        <option value="야전">야전</option>
        <option value="실내전">실내전</option>
      </select>
    </div>
    <div id="em-rf">
      <div class="fg"><label class="fl">난이도</label>
        <select class="fs" id="em-d">
          <option value="HARDCORE">HARDCORE</option>
          <option value="EXTREME">EXTREME</option>
          <option value="INSANE">INSANE</option>
          <option value="TORMENT">TORMENT</option>
          <option value="LUNATIC">LUNATIC</option>
        </select>
      </div>
    </div>
    <div id="em-ef" style="display:none">
      <div class="fg"><label class="fl">TORMENT 방어타입</label><input class="fi" id="em-ta" placeholder="예: 중장갑"></div>
      <div class="fg"><label class="fl">유효속성</label>
        <select class="fs" id="em-at">
          <option value="폭관신">폭관신</option>
          <option value="폭관진">폭관진</option>
          <option value="폭신진">폭신진</option>
          <option value="관신진">관신진</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="fl">기간 (선택)</label><input class="fi" id="em-date" placeholder="예: 26.07.15~26.07.22"></div>
    <div class="ma">
      <button class="btn" style="background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.3);color:#f87171;flex:0 0 auto;padding:11px 14px" onclick="deleteSeason()">삭제</button>
      <button class="btn" onclick="closeEM()">취소</button>
      <button class="btn btnp" onclick="saveSeason()">저장</button>
    </div>
  </div>
</div>

<!-- RANK MODAL -->
<div class="mbg" id="rm">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhdl"></div>
    <h3 id="rm-t">순위 입력</h3>
    <div class="msub" id="rm-s"></div>
    <div class="fg">
      <label class="fl">순위 (미참여시 비워두세요)</label>
      <input class="fi" id="rm-v" type="number" inputmode="numeric" min="1" placeholder="예: 5280">
    </div>
    <div class="ma">
      <button class="btn" onclick="closeRM()">취소</button>
      <button class="btn btnp" onclick="saveRank()">저장</button>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="mbg" id="am">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhdl"></div>
    <h3 id="am-t">시즌 추가</h3>
    <div class="fg"><label class="fl">시즌 번호</label><input class="fi" id="am-s" type="number" inputmode="numeric"></div>
    <div class="fg"><label class="fl">보스</label><select class="fs" id="am-b"></select></div>
    <div class="fg"><label class="fl">기간 (선택)</label><input class="fi" id="am-date" placeholder="예: 26.07.15~26.07.22"></div>
    <div class="fg"><label class="fl">지형</label>
      <select class="fs" id="am-tr">
        <option value="시가전">시가전</option>
        <option value="야전">야전</option>
        <option value="실내전">실내전</option>
      </select>
    </div>
    <div id="am-rf">
      <div class="fg"><label class="fl">난이도</label>
        <select class="fs" id="am-d">
          <option value="HARDCORE">HARDCORE</option>
          <option value="EXTREME">EXTREME</option>
          <option value="INSANE">INSANE</option>
          <option value="TORMENT">TORMENT</option>
          <option value="LUNATIC">LUNATIC</option>
        </select>
      </div>
    </div>
    <div id="am-ef" style="display:none">
      <div class="fg"><label class="fl">TORMENT 방어타입</label><input class="fi" id="am-ta" placeholder="예: 중장갑 또는 경장갑/특수장갑"></div>
      <div class="fg"><label class="fl">유효속성</label>
        <select class="fs" id="am-at">
          <option value="폭관신">폭관신 (폭발/관통/신비)</option>
          <option value="폭관진">폭관진 (폭발/관통/진동)</option>
          <option value="폭신진">폭신진 (폭발/신비/진동)</option>
          <option value="관신진">관신진 (관통/신비/진동)</option>
        </select>
      </div>
    </div>
    <div class="ma">
      <button class="btn" onclick="closeAM()">취소</button>
      <button class="btn btnp" onclick="addSeason()">추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function rebuild(){

  const rMap = new Map();
  RL.forEach(s => rMap.set(s.s, {...s}));
  CR.forEach(s => {
    if (s._deleted) {
      // 삭제 플래그: 기본 시즌 제거
      rMap.delete(s.s);
    } else if (s._override) {
      // override: 기본 시즌 수정
      rMap.set(s.s, {...rMap.get(s.s), ...s});
    } else {
      // 커스텀 시즌 추가
      rMap.set(s.s, {...s});
    }
  });
  RS = Array.from(rMap.values()).sort((a,b) => {
    if (a.s === 'BETA') return -1;
    if (b.s === 'BETA') return 1;
    return a.s - b.s;
  });
  
  // 대결전: 동일하게
  const eMap = new Map();
  EL.forEach(s => eMap.set(s.s, {...s}));

  });
}

  const grid=ticks.map(v=>{const y=yP(v);if(y<pad.t-2||y>pad.t+cH+2)return'';const l=v>=1000?v/1000+'k':''+v;return`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${VW-pad.r}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><text x="${(pad.l-3).toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="end" fill="#4a5a7a" font-size="8" font-family="Rajdhani,sans-serif">${l}</text>`;}).join('');
  const step=Math.max(1,Math.ceil(seasons.length/Math.floor(cW/30)));
  const xlbls=seasons.map((s,i)=>{if(i%step!==0&&i!==seasons.length-1)return'';const l=s.s==='BETA'||s.isBeta?String(s.s):'#'+s.s;return`<text x="${xP(i).toFixed(1)}" y="${(VH-4).toFixed(1)}" text-anchor="middle" fill="#4a5a7a" font-size="7" font-family="Rajdhani,sans-serif">${l}</text>`;}).join('');
  const pts=seasons.map((s,i)=>`${xP(i).toFixed(1)},${yP(ranks[String(s.s)]).toFixed(1)}`).join(' ');
  const ap=`${xP(0).toFixed(1)},${(pad.t+cH).toFixed(1)} ${pts} ${xP(seasons.length-1).toFixed(1)},${(pad.t+cH).toFixed(1)}`;
  const dots=seasons.map((s,i)=>{const rv=ranks[String(s.s)];const sn=s.s==='BETA'||s.isBeta?String(s.s):'#'+s.s;const dotTip=`${sn} ${s.boss}: ${rv.toLocaleString()}위`;
    return`<circle cx="${xP(i).toFixed(1)}" cy="${yP(rv).toFixed(1)}" r="${seasons.length>60?2:3}" fill="${color}" opacity="0.9" style="cursor:pointer" onclick="showInTT(event,'${dotTip}')" onmouseenter="showInTT(event,'${dotTip}')" onmouseleave="hideInTT()"><title>${dotTip}</title></circle>`;}).join('');
  el.innerHTML=`<svg viewBox="0 0 ${VW} ${VH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block"><defs><linearGradient id="g${cid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient><clipPath id="cp${cid}"><rect x="${pad.l}" y="${pad.t}" width="${cW}" height="${cH}"/></clipPath></defs>${grid}<g clip-path="url(#cp${cid})"><polygon points="${ap}" fill="url(#g${cid})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>${dots}</g>${xlbls}</svg>`;
}

let editTarget2 = null;

function openEM(type, key) {
  const isR = type === 'raid';
  const ss = isR ? RS : ES;
  const s = ss.find(x => String(x.s) === String(key));
  if (!s) { toast('시즌 정보 없음'); return; }
  
  editTarget2 = { type, key: String(key), s };
  document.getElementById('em-t').textContent = (isR ? '총력전' : '대결전') + ' 시즌 ' + key + ' 수정';
  
  // 보스 셀렉트
  const bsel = document.getElementById('em-b');
  bsel.innerHTML = BL.map(b => `<option value="${b}" ${b===s.boss?'selected':''}>${b}</option>`).join('');
  
  // 지형
  document.getElementById('em-tr').value = s.terrain || '시가전';
  
  // 총력전/대결전 필드
  document.getElementById('em-rf').style.display = isR ? 'block' : 'none';
  document.getElementById('em-ef').style.display = isR ? 'none' : 'block';
  
  if (isR) {
    document.getElementById('em-d').value = s.diff || 'LUNATIC';
  } else {
    document.getElementById('em-ta').value = s.armor || '';
    document.getElementById('em-at').value = s.attrs || '폭관신';
  }
  
  // 날짜
  const dt = isR ? (RD[s.s] || s.date || '') : (ED[String(s.s)] || s.date || '');
  document.getElementById('em-date').value = dt;
  
  document.getElementById('em').classList.add('on');
}

function closeEM() {
  document.getElementById('em').classList.remove('on');
  editTarget2 = null;
}

function saveSeason() {
  if (!editTarget2) return;
  const { type, key, s } = editTarget2;
  const isR = type === 'raid';
  
  const boss = document.getElementById('em-b').value;
  const terrain = document.getElementById('em-tr').value;
  const date = document.getElementById('em-date').value.trim() || null;
  
  if (isR) {
    const diff = document.getElementById('em-d').value;
    // 커스텀 시즌이면 CR에서 수정, 기본 시즌이면 override 저장
    const ci = CR.findIndex(x => String(x.s) === key);
    const baseIdx = RL.findIndex(x => String(x.s) === key);
    if (ci >= 0) {
      CR[ci] = { ...CR[ci], boss, terrain, diff, date };
    } else if (baseIdx >= 0) {
      // 기본 시즌 override - CR에 추가
      CR.push({ s: s.s, boss, terrain, diff, date, _override: true });
    }
    // 날짜는 RD에도 업데이트
    if (date) RD[s.s] = date;
  } else {
    const taRaw = document.getElementById('em-ta').value;
    const ta = taRaw.split('/').map(a => a.trim()).filter(Boolean);
    const attrs = document.getElementById('em-at').value;
    const armor = ta.join('/');
    const ci = CE.findIndex(x => String(x.s) === key);
    const baseIdx = EL.findIndex(x => String(x.s) === key);
    if (ci >= 0) {
      CE[ci] = { ...CE[ci], boss, terrain, armor, attrs, ta, date };
    } else if (baseIdx >= 0) {
      CE.push({ s: s.s, boss, terrain, armor, attrs, ta, date, _override: true });
    }
    if (date) ED[String(s.s)] = date;
  }
  
  save(); rebuild(); closeEM(); rerender(); toast('수정됨');
}

function deleteSeason() {
  if (!editTarget2) return;
  const { type, key, s } = editTarget2;
  const isR = type === 'raid';
  
  if (!confirm('이 시즌을 삭제할까요? 입력된 순위도 함께 삭제됩니다.')) return;
  
  if (isR) {
    const ci = CR.findIndex(x => String(x.s) === key);
    const baseIdx = RL.findIndex(x => String(x.s) === key);
    
    if (ci >= 0) {
      // 커스텀 시즌 삭제
      CR.splice(ci, 1);
    } else if (baseIdx >= 0) {
      // 기본 시즌: 삭제 플래그 추가
      CR.push({ s: s.s, _deleted: true });
    }
    delete RR[key];
  } else {
    const ci = CE.findIndex(x => String(x.s) === key);
    const baseIdx = EL.findIndex(x => String(x.s) === key);
    
    if (ci >= 0) {
      CE.splice(ci, 1);
    } else if (baseIdx >= 0) {
      CE.push({ s: s.s, _deleted: true });
    }
    delete ER[key];
  }
  
  save(); rebuild(); closeEM(); rerender(); toast('삭제됨');
}

function confirmReset() {
  if (!confirm('⚠️ 경고\n\n입력한 모든 순위 기록이 삭제됩니다.\n추가한 커스텀 시즌도 모두 삭제됩니다.\n\n이 작업은 되돌릴 수 없습니다.\n\n정말 초기화하시겠습니까?')) return;
  if (!confirm('마지막 확인: 정말 모든 기록을 삭제할까요?')) return;

}

function calcS(ss,rr){
  const p=ss.filter(s=>rr[String(s.s)]>0);
  const v=p.map(s=>rr[String(s.s)]);
  const avg=v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null;
  const best=v.length?Math.min(...v):null;
  const bSArr=best?p.filter(s=>rr[String(s.s)]===best):[];
  return{p:p.length,t:ss.length,avg,best,bSArr};
}

function renderDash(){
  const rS=calcS(RS,RR),eS=calcS(ES,ER);
  document.getElementById('dash-stats').innerHTML=`
    <div class="sc hero"><div class="slbl">총력전 최고</div><div class="sval ac">${rS.best?rS.best.toLocaleString():'—'}</div><div class="ssub">${rS.bSArr&&rS.bSArr.length?rS.bSArr.map(s=>(s.s==='BETA'?'β':'#'+s.s)+' '+s.boss).join(', '):'기록 없음'}</div></div>
    <div class="sc"><div class="slbl">총력전 평균</div><div class="sval">${rS.avg?rS.avg.toLocaleString():'—'}</div><div class="ssub">${rS.p}/${rS.t}회</div></div>
    <div class="sc hero"><div class="slbl">대결전 최고</div><div class="sval ac">${eS.best?eS.best.toLocaleString():'—'}</div><div class="ssub">${eS.bSArr&&eS.bSArr.length?eS.bSArr.map(s=>(s.isBeta?String(s.s):'#'+s.s)+' '+s.boss).join(', '):'기록 없음'}</div></div>
    <div class="sc"><div class="slbl">대결전 평균</div><div class="sval">${eS.avg?eS.avg.toLocaleString():'—'}</div><div class="ssub">${eS.p}/${eS.t}회</div></div>`;
  const aR=[...RS.map(s=>RR[s.s]),...ES.map(s=>ER[String(s.s)])].filter(Boolean);
  const tc={플래티넘:0,골드:0,실버:0,브론즈:0};
  aR.forEach(r=>{const t=tier(r);if(t)tc[t]++;});
  document.getElementById('t-row').innerHTML=['플래티넘','골드','실버','브론즈'].map(t=>`
    <div class="tc"><img class="tic" src="data:image/webp;base64,${D.i[t]}" alt="${t}"><div class="tcnt">${tc[t]}</div><div class="tnm">${t}</div></div>`).join('');
  // IN 달성 - 총력전/대결전 분리
  const mkIN=(ranks,seasons)=>[10,100,1000,10000].map(n=>{
    const matched=seasons.filter(s=>ranks[String(s.s)]&&ranks[String(s.s)]<=n);
    const ttLines=matched.map(s=>(s.isBeta?String(s.s):'#'+s.s)+' '+s.boss+' '+ranks[String(s.s)]+'위').join('|');
    return`<div class="inc" style="cursor:pointer" onmouseenter="showInTT(event,'${ttLines}')" onmouseleave="hideInTT()"><div class="innum">${matched.length}</div><div class="inlbl">IN ${n.toLocaleString()}</div></div>`;
  }).join('');
  document.getElementById('in-raid').innerHTML=mkIN(RR,RS);
  document.getElementById('in-elim').innerHTML=mkIN(ER,ES);
  renderBRT('brt-r',RS,RR,true);
  renderTopRanks();
  renderBRT('brt-e',ES,ER,false);
  renderChart();
}

function renderBRT(id,ss,rr,isR){
  const bl=[...new Set(ss.map(s=>s.boss))];
  const st=bl.map(b=>{
    const bss=ss.filter(s=>s.boss===b&&rr[String(s.s)]);
    const v=bss.map(s=>rr[String(s.s)]);
    return{b,avg:v.length?Math.round(v.reduce((a,x)=>a+x,0)/v.length):null,best:v.length?Math.min(...v):null,c:v.length,t:ss.filter(s=>s.boss===b).length};
  }).sort((a,b)=>{if(!a.avg&&!b.avg)return 0;if(!a.avg)return 1;if(!b.avg)return -1;return a.avg-b.avg;});
  document.getElementById(id).innerHTML=`
    <thead><tr><th>보스</th><th style="text-align:right">최고</th><th style="text-align:right">평균</th><th style="text-align:right">참여</th></tr></thead>
    <tbody>${st.map((s)=>{
      const bestC=s.best===1?'#f5c842':s.best===2?'#c8d8ff':s.best===3?'#d4845a':(s.best?'var(--ac)':'var(--tx3)');
      const avgC=s.avg===null?'var(--tx3)':s.avg===1?'#f5c842':s.avg===2?'#c8d8ff':s.avg===3?'#d4845a':'var(--ac)';
      return`<tr>
      <td><div class="bri"><div class="bri-img">${bi(s.b)}</div><span style="font-size:12px">${s.b}</span></div></td>
      <td class="num" style="color:${bestC}">${s.best?s.best.toLocaleString():'—'}</td>
      <td class="num" style="color:${s.avg?avgC:'var(--tx3)'}">${s.avg?s.avg.toLocaleString():'—'}</td>
      <td class="num" style="color:var(--tx2);font-weight:400">${s.c}/${s.t}</td>
    </tr>`;}).join('')}</tbody>`;
}

function setBM(m,btn){
  BM=m;aB=null;
  document.querySelectorAll('#pg-bosses .fc').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('bdet').innerHTML='';
  renderBosses();
}
function renderBosses(){
  const ss=BM==='raid'?RS:ES,rr=BM==='raid'?RR:ER;
  const bl=[...new Set(ss.map(s=>s.boss))];
  document.getElementById('bgrid').innerHTML=bl.map(b=>{
    const bss=ss.filter(s=>s.boss===b&&rr[String(s.s)]);
    const best=bss.length?Math.min(...bss.map(s=>rr[String(s.s)])):null;
    const avg=bss.length?Math.round(bss.reduce((a,s)=>a+rr[String(s.s)],0)/bss.length):null;
    const bestColor=best===1?'#f5c842':best===2?'#c8d8ff':best===3?'#d4845a':'var(--ac)';
    return`<div class="bcard ${aB===b?'sel':''}" onclick="selBoss('${b}')">
      <div class="bcimg">${bi(b)}</div>
      <div class="bcinfo"><div class="bcname">${b}</div>
      <div class="bcbest" style="color:${bestColor}">${best?best.toLocaleString()+'위':'—'}</div>
      <div class="bcmeta">${avg?`평균 ${avg.toLocaleString()} · ${bss.length}회`:'기록 없음'}</div></div></div>`;
  }).join('');
}
function selBoss(b){
  aB=b;renderBosses();
  const ss=BM==='raid'?RS:ES,rr=BM==='raid'?RR:ER;
  const bss=ss.filter(s=>s.boss===b);
  const p=bss.filter(s=>rr[String(s.s)]);
  const best=p.length?Math.min(...p.map(s=>rr[String(s.s)])):null;
  const avg=p.length?Math.round(p.reduce((a,s)=>a+rr[String(s.s)],0)/p.length):null;
  const isR=BM==='raid';
  document.getElementById('bdet').innerHTML=`
    <div class="bdet">
      <div class="bdh">${bi(b)}<div class="bdhn">${b}</div></div>
      <div class="bdst">
        <div class="bds"><div class="bdsv">${best?best.toLocaleString():'—'}</div><div class="bdsl">최고</div></div>
        <div class="bds"><div class="bdsv">${avg?avg.toLocaleString():'—'}</div><div class="bdsl">평균</div></div>
        <div class="bds"><div class="bdsv">${p.length}<span style="font-size:11px;color:var(--tx3)">/${bss.length}</span></div><div class="bdsl">참여</div></div>
      </div>
      <div class="tcard" style="border-radius:0;border:none">
        ${bss.map(s=>{
          const r=rr[String(s.s)];const sn=s.isBeta?'β'+String(s.s).slice(-1):'#'+s.s;
          const diffs=isR?null:attrDiffs(s);
          const selMc=r===1?'rank-gold':r===2?'rank-silver':r===3?'rank-bronze':'';
          return`<div class="tr ${selMc}" onclick="openRM('${BM}','${s.s}','${isR?'시즌 '+s.s:s.s}','${b}','${s.terrain}',${isR?`'${s.diff}'`:null})">
            <div class="tsn">${sn}</div>
            <div class="tmeta" style="gap:4px">${ti(s.terrain)}${isR?`<span class="db d${s.diff.slice(0,3)}">${s.diff}</span>`:diffs.map(d=>`<span class="db ${d.cls}">${d.label}</span>`).join('')}</div>
            <div class="trank ${r?'':'mt'}">${r?r.toLocaleString():'—'}</div>
            <div>${tiImg(r)}</div></div>`;
        }).join('')}
      </div></div>`;
  document.getElementById('bdet').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderOV(){
  ovSec('ov-r',RS,RR,'raid');
  ovSec('ov-e',ES,ER,'elim');
}
function ovSec(id,ss,rr,type){
  
  document.getElementById(id).innerHTML=ss.map(s=>{
    const r=rr[String(s.s)];const cls=tcls(r);
    const sn=s.isBeta?'β'+String(s.s).slice(-1):'#'+s.s;
    const bn=bnames[s.boss]||s.boss.slice(0,3);
    const rk=r?r.toLocaleString():'—';
    const ovBorder=r===1?'2px solid #f5c842':r===2?'2px solid #c8d8ff':r===3?'2px solid #d4845a':'';
    const ovRkColor=r===1?'#f5c842':r===2?'#c8d8ff':r===3?'#d4845a':'';
    return`<div class="ovc ${cls||'empty-r'}" style="${ovBorder?'border:'+ovBorder:''}" title="${s.boss} | ${sn} | ${r?r.toLocaleString()+'위':'미입력'}" onclick="openRM('${type}','${s.s}','${s.isBeta?s.s:'시즌 '+s.s}','${s.boss}','${s.terrain}',${type==='raid'?`'${s.diff}'`:null})">
      <div class="ovsn">${sn}</div>
      <div class="ovbn">${bn}</div>
      <div class="ovrk" style="${ovRkColor?'color:'+ovRkColor:''}">${rk}</div>
    </div>`;
  }).join('');
}

function setBK(m,btn){
  if(Object.keys(BKC).length>0&&!confirm('저장하지 않은 변경사항이 있어요. 계속할까요?'))return;
  BKC={};BKM=m;
  document.querySelectorAll('#pg-bulk .fbar:first-child .fc').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');renderBulk();
}
function setBKF(v,btn){
  BKF=v;
  document.querySelectorAll('#bkf .fc').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');renderBulk();
}
function onBI(key,val,el){
  const n=parseInt(val);
  if(val===''||isNaN(n)||n<=0){
    delete BKC[key];
    el.classList.remove('chg');
    el.style.borderColor='';
  }else{
    BKC[key]=n;
    el.classList.add('chg');
  }
  updBKStat();
}
function updBKStat(){
  const n=Object.keys(BKC).length;
  document.getElementById('bkstat').textContent=n>0?`${n}개 변경됨 (미저장)`:'변경사항 없음';
  const rb=document.getElementById('revert-btn');
  if(rb)rb.style.display=n>0?'inline-flex':'none';
}
function revertBulk(){
  const n=Object.keys(BKC).length;
  if(!n){toast('되돌릴 변경사항 없음');return;}
  BKC={};
  renderBulk();
  toast(`${n}개 변경사항 취소됨`);
}
function saveBulk(){
  const n=Object.keys(BKC).length;
  if(n===0){toast('변경사항 없음');return;}
  const m=BKM==='raid'?RR:ER;
  for(const k in BKC){const v=BKC[k];if(!v||v<=0)delete m[k];else m[k]=v;}
  BKC={};save();rerender();renderBulk();toast(`${n}개 저장됨`);
}
function applyPaste(){
  const raw=document.getElementById('parea').value;
  if(!raw.trim()){toast('붙여넣을 내용이 없어요');return;}
  if(!BKS.length){toast('적용할 시즌이 없어요');return;}

  // 줄 단위로 분리 (빈 줄도 유지 - 엑셀 빈칸)
  // \r\n, \r, \n 모두 처리
  const lines=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');

  // 가로(탭 구분) vs 세로 판단
  const isHoriz=lines.filter(l=>l.trim()).length<=2&&lines[0].includes('\t');
  const vals=isHoriz
    ?lines[0].split('\t').map(v=>v.trim())  // 가로: 탭으로 분리
    :lines.map(v=>v.trim());                  // 세로: 줄 그대로 (빈 줄 포함)

  // 시작 시즌 처리
  const startInput=document.getElementById('paste-start');
  const startSn=startInput?startInput.value.trim():'';
  let startIdx=0;
  if(startSn){
    const found=BKS.indexOf(startSn);
    if(found>=0)startIdx=found;
    else{toast(`시즌 ${startSn}을(를) 찾을 수 없어요`);return;}
  }
  const available=BKS.slice(startIdx);

  let applied=0,skipped=0;
  const cnt=Math.min(vals.length,available.length);
  for(let i=0;i<cnt;i++){
    const raw_v=vals[i];
    if(raw_v===''){skipped++;continue;}  // 빈칸 → 해당 시즌 건너뜀
    const v=raw_v.replace(/[^\d]/g,'');
    if(v.length>0){
      const n=parseInt(v);
      if(!isNaN(n)&&n>0){BKC[available[i]]=n;applied++;}
    }
  }
  if(!applied&&!skipped){toast('숫자를 찾을 수 없어요');return;}
  document.getElementById('parea').value='';
  if(startInput)startInput.value='';
  document.querySelector('details.pb').open=false;
  renderBulk();
  toast(skipped>0?`${applied}개 적용, ${skipped}개 건너뜀 — 저장 버튼을 눌러주세요`:`${applied}개 적용됨 — 저장 버튼을 눌러주세요`);
}
function renderBulk(){
  const ss=BKM==='raid'?RS:ES,rr=BKM==='raid'?RR:ER;
  const fl=ss.filter(s=>{const r=rr[String(s.s)];if(BKF==='empty')return!r;if(BKF==='filled')return r>0;return true;});
  BKS=fl.map(s=>String(s.s));
  const el=document.getElementById('bklist');
  if(!fl.length){el.innerHTML='<div class="empty">데이터 없음</div>';updBKStat();return;}
  const isR=BKM==='raid';
  el.innerHTML=fl.map(s=>{
    const key=String(s.s);const r=rr[key];
    const sn=s.isBeta?'β'+String(s.s).slice(-1):'#'+s.s;
    const bkm=r===1?'rank-gold':r===2?'rank-silver':r===3?'rank-bronze':'';
    const cv=BKC[key]!==undefined?BKC[key]:(r||'');
    const chg=BKC[key]!==undefined;
    const diffs=isR?null:attrDiffs(s);
    return`<div class="bkrow ${bkm}">
      <div class="bkimg">${bi(s.boss)}</div>
      <div class="bksn">${sn}</div>
      <div class="bkic"><div class="bkname">${s.boss}</div>
        <div class="bkmeta">${ti(s.terrain)}${isR?`<span class="db d${s.diff.slice(0,3)}">${s.diff}</span>`:diffs.map(d=>`<span class="db ${d.cls}">${d.label}</span>`).join('')}</div>${(isR?(RD[s.s]||s.date):(ED[String(s.s)]||s.date))?`<div style="font-size:9px;color:var(--tx3);margin-top:1px">${isR?(RD[s.s]||s.date):(ED[String(s.s)]||s.date)}</div>`:''}</div>
      <input class="bkinput ${chg?'chg':''}" type="number" inputmode="numeric" min="1" placeholder="—" value="${cv}" oninput="onBI('${key}',this.value,this)">
      <button onclick="openEM('${BKM}','${key}')" style="background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0">⋮</button>
    </div>`;
  }).join('');
  updBKStat();
}

function exportData(){
  const d={r:RR,e:ER,cr:CR,ce:CE,v:3,ts:new Date().toISOString()};
  const str=JSON.stringify(d,null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(str);
  a.download=`record_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('저장됨');
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      RR=d.r||d.raidRanks||d.raid||{};
      ER=d.e||d.elimRanks||d.elim||{};
      CR=d.cr||d.customRaid||[];
      CE=d.ce||d.customElim||[];
      save();load();rerender();toast('가져오기 완료');
    }catch{toast('파일 형식 오류');}
  };
  rd.readAsText(f);ev.target.value='';
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);
}

function rerender(){
  const a=document.querySelector('.pg.on');if(!a)return;
  const id=a.id.replace('pg-','');
  const _renders={dashboard:renderDash,raid:renderRaid,elim:renderElim,bosses:renderBosses,overview:renderOV,bulk:renderBulk};if(_renders[id])_renders[id]();
  if(id==='dashboard')setTimeout(()=>renderChart(),100);
}

load();
loadWidth();
renderDash();
</script>
<div class="in-tooltip" id="in-tt"></div>
</body>
